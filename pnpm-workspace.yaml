packages:
  - "packages/*"
  - "packages/config/*"
  - "!packages/config"

catalog:
  tsdown: 0.21.7
  typescript: 6.0.2
  zod: 4.3.6

catalogs:
  vitest:
    vitest: 4.1.2
    "@vitest/coverage-v8": 4.1.2

linkWorkspacePackages: true

blockExoticSubdeps: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200