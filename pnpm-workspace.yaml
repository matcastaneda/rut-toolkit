packages:
  - "packages/*"
  - "packages/config/*"

catalog:
  tsdown: 0.21.5
  typescript: 6.0.2
  zod: 4.3.6

catalogs:
  vitest:
    vitest: 4.1.1
    "@vitest/coverage-v8": 4.1.1

linkWorkspacePackages: true
blockExoticSubdeps: true
enableGlobalVirtualStore: true
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 43200