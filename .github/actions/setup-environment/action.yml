name: 🔧 Setup Environment Workflow
description: 🚀 Composite action that sets up Node.js, pnpm, and installs dependencies
runs:
  using: "composite"
  steps:
    - name: 📦 Setup pnpm
      uses: pnpm/action-setup@v5
      with:
        run_install: false

    - name: 🟢 Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .node-version
        cache: 'pnpm'

    - name: 📥 Install dependencies
      shell: bash
      run: |
        echo "🔍 pnpm version: $(pnpm --version)"
        echo "💾 Installing dependencies..."
        pnpm install --frozen-lockfile