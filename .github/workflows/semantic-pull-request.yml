name: 🏷️ Semantic Pull Request

on:
  pull_request_target:
    types:
      - opened
      - reopened
      - edited
      - synchronize

permissions:
  pull-requests: write

jobs:
  validate:
    name: Validate PR title
    runs-on: ubuntu-latest
    steps:
      - name: 🔍 Validate PR title
        uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        id: lint_pr_title
        with:
          scopes: |
            core
            zod
            infra
            deps
          requireScope: false
          ignoreLabels: |
            bot
            ignore-semantic-pull-request
          subjectPattern: ^(?![A-Z]).+$ 
          subjectPatternError: |
            The subject "{subject}" found in the pull request title "{title}" is invalid.
            We require the subject to be completely in lowercase (e.g., "fix: resolve validation bug" instead of "fix: Resolve validation bug").
            Please edit your PR title to match this pattern.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: ⚠️ Comment on invalid PR title
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: always() && (steps.lint_pr_title.outputs.error_message != null)
        with:
          header: pr-title-lint-error
          message: |
            👋 Thank you for your contribution to `@rut-toolkit`!

            To keep our release process automated and our history clean, we require all Pull Request titles to follow the [Conventional Commits](https://www.conventionalcommits.org/en/v1.0.0/) specification. 

            It looks like your PR title needs a quick adjustment. 

            **Here are some valid examples:**
            - `feat(core): add format engine`
            - `fix(zod): resolve validation edge case`
            - `docs: update README installation steps`
            - `chore(deps): bump vite to v5`

            **Error details:**
            ```text
            ${{ steps.lint_pr_title.outputs.error_message }}
            ```

            Just edit the title of this PR at the top of the page, and this check will automatically pass. Let us know if you need any help! 🚀

      - name: 🧹 Remove comment on valid PR title
        uses: marocchino/sticky-pull-request-comment@70d2764d1a7d5d9560b100cbea0077fc8f633987 # v3.0.2
        if: ${{ steps.lint_pr_title.outputs.error_message == null }}
        with:
          header: pr-title-lint-error
          delete: true