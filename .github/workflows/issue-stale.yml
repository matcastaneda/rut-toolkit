# Adapted from shadcn-ui/ui
name: 📅 Stale issue handler

on:
  workflow_dispatch:
  schedule:
    # This runs every day 20 minutes before midnight: https://crontab.guru/#40_23_*_*_*
    - cron: "40 23 * * *"

jobs:
  stale:
    runs-on: ubuntu-latest
    if: github.repository_owner == 'matcastaneda'
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: 🔍 Mark stale issues, close stale issues
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        id: issue-stale
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          ascending: true
          days-before-issue-close: 7
          days-before-issue-stale: 365
          days-before-pr-stale: -1
          days-before-pr-close: -1
          remove-issue-stale-when-updated: true
          stale-issue-label: "status: stale"
          exempt-issue-labels: "type: bug,status: blocked,status: help wanted,status: in progress,type: idea"
          stale-issue-message: "👋 Hello there! This issue has been automatically marked as stale because it hasn't had any recent activity in the last year.\n\nIt will be closed in 7 days if no further activity occurs. If this is still a relevant problem or you'd like to keep the discussion open, please leave a quick comment to let us know. Thank you for your contributions!"
          close-issue-message: "🔒 This issue has been automatically closed due to inactivity.\n\nIf you are still experiencing this problem or have new information to add, please feel free to open a new issue following our templates. We appreciate your understanding and support!"
          operations-per-run: 300

      - name: 🔍 Mark stale PRs, close stale PRs
        uses: actions/stale@b5d41d4e1d5dceea10e7104786b73624c18a190f # v10.2.0
        id: pr-state
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          ascending: true
          days-before-issue-close: -1
          days-before-issue-stale: -1
          days-before-pr-close: 7
          days-before-pr-stale: 365
          remove-pr-stale-when-updated: true
          stale-pr-label: "status: stale"
          exempt-pr-labels: "type: bug,status: blocked,status: in progress"
          stale-pr-message: "👋 Hi! This PR has been automatically marked as stale due to one year of inactivity.\n\nIt will be closed in 7 days unless there's further input. If you're still working on this or need help getting it across the finish line, just leave a comment! Thank you for your effort."
          close-pr-message: "🔒 This PR has been automatically closed due to inactivity. Thank you so much for your time and the code you proposed! If you decide to pick this up again in the future, feel free to open a new PR."
          operations-per-run: 300
